<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConvYH V3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="flare-bg"></div>

    <div class="wrapper">
        <h1 class="title">ConvYH V3</h1>

        <div class="top-controls">
            <input id="searchInput" type="text" placeholder="Search...">
            <button id="launchGame">Launch Game</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-filter="all">Home</button>
            <button class="tab" data-filter="games">Games</button>
            <button class="tab" data-filter="tools">Tools</button>
            <button class="tab" data-filter="settings">Settings</button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <!-- Modal Frame -->
    <div id="frameModal" class="modal">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">Close</button>

            <input id="frameSearch" type="text" placeholder="Search inside frame...">

            <iframe id="proxyFrame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
